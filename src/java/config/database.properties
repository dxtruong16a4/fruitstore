# Database Configuration for FruitStore
# MySQL Database Settings

# Database connection properties
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/FruitStore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
db.username=root
db.password=

# Connection pool settings
db.pool.initialSize=5
db.pool.maxActive=20
db.pool.maxIdle=10
db.pool.minIdle=5
db.pool.maxWait=60000

# Connection validation
db.pool.validationQuery=SELECT 1
db.pool.testOnBorrow=true
db.pool.testOnReturn=false
db.pool.testWhileIdle=true
db.pool.timeBetweenEvictionRunsMillis=30000
db.pool.numTestsPerEvictionRun=3
db.pool.minEvictableIdleTimeMillis=60000

# Additional MySQL specific settings
db.pool.removeAbandoned=true
db.pool.removeAbandonedTimeout=300
db.pool.logAbandoned=true
